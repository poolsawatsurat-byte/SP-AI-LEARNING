name: Nextjs Workshop Demo

on:
  push:
    branches:
      - 'feature-**'

jobs:
  lint-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: node -v
      - run: npm ci
      - run: npm run lint